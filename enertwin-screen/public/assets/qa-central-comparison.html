<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EnerTwin Central Scene QA</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #030712; color: #dff8ff; font-family: Arial, sans-serif; }
      main { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; height: 100%; padding: 8px; }
      figure { position: relative; display: grid; grid-template-rows: 28px 1fr; min-width: 0; min-height: 0; margin: 0; overflow: hidden; border: 1px solid #15557b; background: #020814; }
      figcaption { display: flex; align-items: center; padding: 0 10px; color: #8cecff; border-bottom: 1px solid #15557b; font-size: 13px; }
      .crop { position: relative; min-height: 0; overflow: hidden; }
      img { position: absolute; top: 0; left: -50%; display: block; width: 200%; height: 100%; object-fit: fill; }
    </style>
  </head>
  <body>
    <main>
      <figure><figcaption>Reference · central 3D scene</figcaption><div class="crop"><img src="/assets/qa-reference.png" alt="Reference central scene" /></div></figure>
      <figure><figcaption>Implementation · central 3D scene</figcaption><div class="crop"><img src="/assets/qa-final.jpg" alt="Implementation central scene" /></div></figure>
    </main>
  </body>
</html>
