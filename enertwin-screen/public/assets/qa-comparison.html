<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EnerTwin Design QA Comparison</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #030712; color: #dff8ff; font-family: Arial, sans-serif; }
      main { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; height: 100%; padding: 8px; }
      figure { position: relative; display: grid; grid-template-rows: 28px 1fr; min-width: 0; min-height: 0; margin: 0; border: 1px solid #15557b; background: #020814; }
      figcaption { display: flex; align-items: center; padding: 0 10px; color: #8cecff; border-bottom: 1px solid #15557b; font-size: 13px; }
      img { display: block; width: 100%; height: 100%; object-fit: fill; }
    </style>
  </head>
  <body>
    <main>
      <figure><figcaption>目标图 · 对齐至 1920×1080</figcaption><img src="/assets/qa-reference-iteration2.png" alt="Reference" /></figure>
      <figure><figcaption>当前实现 · 第二轮</figcaption><img src="/assets/qa-iteration2.png" alt="Implementation" /></figure>
    </main>
  </body>
</html>
